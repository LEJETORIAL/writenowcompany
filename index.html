<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WRITENOW COMPANY — Coming Soon</title>
  <meta name="description" content="WRITENOW COMPANY — Editorial · Content · Branding. Website launching soon." />
  <style>
    :root { --bg:#0b0c0f; --fg:#f2f2f2; --muted:rgba(242,242,242,.68); --line:rgba(242,242,242,.18); }
    html,body{height:100%;}
    body{
      margin:0; background:radial-gradient(1200px 800px at 20% 10%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(1000px 700px at 80% 30%, rgba(255,255,255,.06), transparent 55%),
      var(--bg);
      color:var(--fg);
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      letter-spacing:.2px;
    }
    .wrap{min-height:100%; display:grid; place-items:center; padding:32px;}
    .card{
      width:min(920px, 100%);
      border:1px solid var(--line);
      border-radius:24px;
      padding:44px 40px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,.02);
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    .top{display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:22px;}
    .mark{font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted);}
    .right{font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); text-align:right;}
    h1{margin:0; font-size:clamp(34px, 4vw, 52px); line-height:1.06; font-weight:600;}
    .sub{margin-top:14px; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:15px; line-height:1.65; color:var(--muted); max-width:60ch;}
    .line{height:1px; background:var(--line); margin:26px 0;}
    .grid{display:grid; grid-template-columns: 1fr auto; gap:18px; align-items:end;}
    .pill{display:inline-flex; gap:10px; align-items:center; padding:10px 14px; border:1px solid var(--line);
      border-radius:999px; color:var(--muted); font-family: ui-sans-serif, system-ui; font-size:13px;}
    a{color:var(--fg); text-decoration:none; border-bottom:1px solid rgba(242,242,242,.35);}
    a:hover{border-bottom-color:rgba(242,242,242,.85);}
    .small{font-family: ui-sans-serif, system-ui; font-size:13px; color:var(--muted); line-height:1.6;}
    @media (max-width:640px){
      .card{padding:34px 22px;}
      .top{flex-direction:column; align-items:flex-start;}
      .right{text-align:left;}
      .grid{grid-template-columns:1fr; align-items:start;}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" role="region" aria-label="Coming soon">
      <div class="top">
        <div class="mark">WRITENOW COMPANY</div>
        <div class="right">Editorial · Content · Branding</div>
      </div>

      <h1>We craft stories and ideas<br/>that move brands.</h1>
      <p class="sub">
        Website launching soon. If you’d like to work together, email us — we’ll reply quickly.
      </p>

      <div class="line"></div>

      <div class="grid">
        <div class="small">
          Based in Seoul · Available worldwide<br/>
          © <span id="y"></span> WRITENOW COMPANY
        </div>
        <div class="pill">
          Contact: <a href="mailto:leboratorial@gmail.com">leboratorial@gmail.com</a>
        </div>
      </div>
    </section>
  </main>

  <script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
